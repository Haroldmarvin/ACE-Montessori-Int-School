<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ACE Montessori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --tekhelet: #49377D;
            --pomp-power: #8B6394;
        }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
        }
        .login-card { 
            border: none;
            border-top: 6px solid var(--tekhelet); 
            width: 100%;
            max-width: 400px; 
            border-radius: 15px;
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); }
        
        .btn-tekhelet { 
            background: var(--tekhelet); 
            color: white; 
            padding: 12px;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-tekhelet:hover { 
            background: var(--pomp-power); 
            color: white; 
            box-shadow: 0 4px 15px rgba(73, 55, 125, 0.3);
        }
        .form-control {
            padding: 12px;
            border-radius: 8px;
            background: #fdfdfd;
        }
        .form-control:focus {
            border-color: var(--pomp-power);
            box-shadow: 0 0 0 0.25rem rgba(139, 99, 148, 0.1);
        }
        .input-group-text {
            cursor: pointer;
            background: white;
            border-left: none;
        }
        #errorMsg { display: none; }
    </style>
</head>
<body>

    <div class="card shadow-lg login-card p-4 mx-3">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--tekhelet);">ACE Admin</h2>
            <p class="text-muted small">Please sign in to manage school data</p>
        </div>

        <div id="errorMsg" class="alert alert-danger py-2 small text-center mb-3">
            <i class="bi bi-exclamation-circle me-2"></i> <span id="errorText">Invalid Credentials</span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Admin username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" class="form-control" style="border-right: none;" placeholder="••••••••" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-tekhelet w-100 fw-bold">
                LOGIN <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-decoration-none small text-muted">
                <i class="bi bi-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });

        // Form Submission Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Authenticating...`;
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // Store JWT Token for secure requests
                    localStorage.setItem('aceToken', data.token);
                    localStorage.setItem('adminName', data.username || 'Administrator');
                    
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(data.msg || 'Access Denied');
                }
            } catch (err) {
                errorText.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = `LOGIN <i class="bi bi-box-arrow-in-right ms-2"></i>`;
            }
        });
    </script>
</body>
</html>
